version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: shield-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: shield
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shield-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASS}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shield-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build: ./ai-service
    container_name: shield-ai
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - .env

  digital-twin:
    build: ./digital-twin
    container_name: shield-twin
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - .env
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: shield-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
